ol\")\"\n  validate_arm64_tool \"$source_path\" \"$tool\"\n  validate_self_contained_tool \"$source_path\" \"$tool\"\n  rm -f \"$TOOLS_DIR/$tool\"\n  cp -f \"$source_path\" \"$TOOLS_DIR/$tool\"\n  chmod +x \"$TOOLS_DIR/$tool\"\ndone\n\ncopy_required_model \"ggml-base.en.bin\"\ncopy_required_model \"ggml-base.en-encoder.mlmodelc\"\n";
