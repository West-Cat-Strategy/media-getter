name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  XCODEGEN_VERSION: 2.45.4

jobs:
  build-and-publish:
    runs-on: macos-15
    env:
      BUILD_ROOT: build/release
      REPO_SLUG: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      SPARKLE_KEY_ACCOUNT: media-getter
      SPARKLE_VERSION: 2.9.1
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
      APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
      APPLE_NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Pinned XcodeGen
        run: |
          if command -v xcodegen >/dev/null 2>&1 && [[ "$(xcodegen --version | awk '/Version:/ { print $2 }')" == "$XCODEGEN_VERSION" ]]; then
            exit 0
          fi

          XCODEGEN_DIR="$RUNNER_TEMP/xcodegen"
          rm -rf "$XCODEGEN_DIR"
          mkdir -p "$XCODEGEN_DIR"
          gh release download "$XCODEGEN_VERSION" \
            --repo yonaskolb/XcodeGen \
            --pattern "xcodegen.zip" \
            --dir "$XCODEGEN_DIR"
          unzip -q "$XCODEGEN_DIR/xcodegen.zip" -d "$XCODEGEN_DIR"
          echo "$XCODEGEN_DIR/xcodegen/bin" >> "$GITHUB_PATH"
          export PATH="$XCODEGEN_DIR/xcodegen/bin:$PATH"
          [[ "$(xcodegen --version | awk '/Version:/ { print $2 }')" == "$XCODEGEN_VERSION" ]]

      - name: Prepare Signing Keychain
        env:
          APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/media-getter-release.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          P12_PATH="$RUNNER_TEMP/media-getter-developer-id.p12"

          printf '%s' "$APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64" | base64 --decode > "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install Notary API Key
        env:
          APPLE_NOTARY_API_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_BASE64 }}
        run: |
          NOTARY_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_API_KEY_ID}.p8"
          printf '%s' "$APPLE_NOTARY_API_KEY_P8_BASE64" | base64 --decode > "$NOTARY_API_KEY_PATH"
          echo "NOTARY_API_KEY_PATH=$NOTARY_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Download Sparkle Tools
        run: |
          SPARKLE_DOWNLOAD_DIR="$RUNNER_TEMP/sparkle"
          mkdir -p "$SPARKLE_DOWNLOAD_DIR"
          gh release download "$SPARKLE_VERSION" \
            --repo sparkle-project/Sparkle \
            --pattern "Sparkle-${SPARKLE_VERSION}.tar.xz" \
            --dir "$SPARKLE_DOWNLOAD_DIR"
          tar -xf "$SPARKLE_DOWNLOAD_DIR"/"Sparkle-${SPARKLE_VERSION}.tar.xz" -C "$SPARKLE_DOWNLOAD_DIR"
          SPARKLE_BIN_DIR="$(find "$SPARKLE_DOWNLOAD_DIR" -type d -path '*/bin' -print -quit)"
          echo "SPARKLE_BIN_DIR=$SPARKLE_BIN_DIR" >> "$GITHUB_ENV"

      - name: Import Sparkle Signing Key
        env:
          SPARKLE_PRIVATE_ED_KEY_FILE_BASE64: ${{ secrets.SPARKLE_PRIVATE_ED_KEY_FILE_BASE64 }}
        run: |
          SPARKLE_PRIVATE_KEY_FILE="$RUNNER_TEMP/sparkle_private_key"
          printf '%s' "$SPARKLE_PRIVATE_ED_KEY_FILE_BASE64" | base64 --decode > "$SPARKLE_PRIVATE_KEY_FILE"
          ./script/import_sparkle_private_key.sh "$SPARKLE_BIN_DIR" "$SPARKLE_PRIVATE_KEY_FILE"

      - name: Create Draft Release Notes
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          RELEASE_VERSION="${TAG_NAME#v}"

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes --draft
          else
            gh release edit "$TAG_NAME" --draft=true --title "$TAG_NAME"
          fi

          mkdir -p "$BUILD_ROOT"
          gh release view "$TAG_NAME" --json body --jq .body > "$BUILD_ROOT/release-notes.md"
          echo "RELEASE_PUBLISHED_AT=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "RELEASE_URL=https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Generate Project And Resolve Packages
        run: |
          xcodegen generate --spec project.yml
          xcodebuild -resolvePackageDependencies -project MediaGetter.xcodeproj -scheme MediaGetter

      - name: Verify Generated Project Files
        run: |
          git diff --exit-code -- \
            MediaGetter.xcodeproj \
            MediaGetter.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved

      - name: Export Signed Release Bundle
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: ./script/export_release_bundle.sh

      - name: Notarize Release Bundle
        run: ./script/notarize_release_bundle.sh

      - name: Package Sparkle Update Feed
        env:
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_NOTES_FILE: build/release/release-notes.md
        run: ./script/generate_sparkle_appcast.sh

      - name: Run Appcast Smoke Test
        run: |
          if [[ -x script/tests/test_generate_sparkle_appcast.sh ]]; then
            script/tests/test_generate_sparkle_appcast.sh
          else
            echo "No appcast smoke test present yet."
          fi

      - name: Upload Release Assets
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "$BUILD_ROOT/dist/MediaGetter.zip" \
            "$BUILD_ROOT/dist/appcast.xml" \
            --clobber

      - name: Publish Release
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
